version: '3.8'

services:
  portfolio-staging:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portfolio-staging
    restart: unless-stopped
    ports:
      - "3001:3000"  # Maps host port 3001 to container port 3000
    environment:
      - NODE_ENV=production
      - PORT=3000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    labels:
      - "com.portfolio.description=Portfolio Staging Environment"
      - "com.portfolio.environment=staging"
    networks:
      - portfolio-network

networks:
  portfolio-network:
    driver: bridge
