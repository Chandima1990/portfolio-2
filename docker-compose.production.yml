version: '3.8'

services:
  portfolio:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portfolio-production
    restart: unless-stopped
    ports:
      - "3000:3000"  # Maps host port 3000 to container port 3000
    environment:
      - NODE_ENV=production
      - PORT=3000
      - RESEND_API_KEY=${RESEND_API_KEY}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    labels:
      - "com.portfolio.description=Portfolio Production Environment"
      - "com.portfolio.environment=production"
    networks:
      - portfolio-network

networks:
  portfolio-network:
    driver: bridge
